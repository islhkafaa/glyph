syntax = "proto3";

package glyph;

message Empty {}

message HnswConfigProto {
  uint32 dim = 1;
  uint32 m = 2;
  uint32 m0 = 3;
  uint32 ef_construction = 4;
  string metric = 5;
  uint32 max_elements = 6;
  string quant_mode = 7;
  uint32 pq_m = 8;
}

message CreateNamespaceRequest {
  string name = 1;
  HnswConfigProto config = 2;
}

message DropNamespaceRequest {
  string name = 1;
}

message Value {
  oneof val {
    string string_val = 1;
    double double_val = 2;
    bool bool_val = 3;
  }
}

message UpsertRequest {
  string namespace = 1;
  uint64 id = 2;
  repeated float vector = 3;
  map<string, Value> metadata = 4;
}

message UpsertEntryProto {
  uint64 id = 1;
  repeated float vector = 2;
  map<string, Value> metadata = 3;
}

message BatchUpsertRequest {
  string namespace = 1;
  repeated UpsertEntryProto entries = 2;
}

message DeleteRequest {
  string namespace = 1;
  uint64 id = 2;
}

message TrainRequest {
  string namespace = 1;
}

message EqFilterProto {
  string key = 1;
  Value value = 2;
}

message RangeFilterProto {
  string key = 1;
  double low = 2;
  double high = 3;
}

message Filter {
  oneof filter_type {
    EqFilterProto eq = 1;
    RangeFilterProto range = 2;
  }
}

message SearchRequest {
  string namespace = 1;
  repeated float query = 2;
  uint32 k = 3;
  uint32 ef = 4;
  Filter filter = 5;
}

message SearchHit {
  uint64 id = 1;
  float distance = 2;
  map<string, Value> metadata = 3;
}

message SearchResponse {
  repeated SearchHit hits = 1;
}

message ListNamespacesResponse {
  repeated string names = 1;
}

message GetNamespaceRequest {
  string name = 1;
}

message NamespaceInfoProto {
  HnswConfigProto config = 1;
  uint64 size = 2;
}

message HealthResponse {
  string status = 1;
  uint64 uptime_s = 2;
}

message StatsResponse {
  uint64 namespace_count = 1;
  uint64 total_vectors = 2;
  uint64 upserts = 3;
  uint64 searches = 4;
  uint64 deletes = 5;
  uint64 errors = 6;
}

service GlyphService {
  rpc CreateNamespace (CreateNamespaceRequest) returns (Empty);
  rpc DropNamespace (DropNamespaceRequest) returns (Empty);
  rpc Upsert (UpsertRequest) returns (Empty);
  rpc BatchUpsert (BatchUpsertRequest) returns (Empty);
  rpc Delete (DeleteRequest) returns (Empty);
  rpc Train (TrainRequest) returns (Empty);
  rpc Search (SearchRequest) returns (SearchResponse);
  rpc ListNamespaces (Empty) returns (ListNamespacesResponse);
  rpc GetNamespace (GetNamespaceRequest) returns (NamespaceInfoProto);
  rpc Health (Empty) returns (HealthResponse);
  rpc Stats (Empty) returns (StatsResponse);
}
